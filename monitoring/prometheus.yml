# Prometheus configuration for Sacred Journey Pipeline

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Sacred Journey Pipeline metrics
  - job_name: 'sacred-journey-pipeline'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Neo4j metrics
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    metrics_path: '/metrics'
